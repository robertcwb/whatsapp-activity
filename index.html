<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Teste WhatsApp Activity</title>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="postmonger.js"></script>

  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .info {
      padding: 15px;
      border-radius: 4px;
      background: #e8f4fd;
      border-left: 4px solid #0176d3;
    }
  </style>
</head>
<body>
  <h2>🔧 Teste de Configuração da Activity</h2>
  <div class="info">
    <p>Se o modal fechar ao clicar em <strong>Done</strong>, o handshake com o Journey Builder está OK.</p>
  </div>

  <script>
    var connection = new Postmonger.Session();
    var activity = {};

    // 1) Registramos os handlers ANTES de mandar o READY
    connection.on("initActivity", function (payload) {
      console.log("✅ initActivity recebido:", payload);
      activity = payload || {};

      connection.trigger("updateButton", {
        button: "next",
        enabled: true
      });
    });

    connection.on("requestedInteraction", function (data) {
      console.log("ℹ️ requestedInteraction:", data);
    });

    connection.on("clickedNext", function () {
      console.log("🟢 clickedNext recebido, enviando updateActivity...");

      activity.metaData = activity.metaData || {};
      activity.metaData.isConfigured = true;

      connection.trigger("updateButton", { button: "next", enabled: false });
      connection.trigger("updateActivity", activity);
    });

    // 2) Só depois que tudo está registrado, disparamos o READY
    document.addEventListener("DOMContentLoaded", function () {
      console.log("🔵 index.html carregado, enviando READY...");
      connection.trigger("ready");
      connection.trigger("requestedInteraction");
    });
  </script>
</body>
</html>
