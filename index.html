<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Enviar WhatsApp (Salesforce) - V3</title>

    <script src="jquery.min.js"></script>
    <script src="postmonger.js"></script>
    <script src="customActivity-v3.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f4f4f7;
        }
        .container {
            max-width: 700px;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h2 { color: #0070d2; }
        label { font-weight: bold; margin-top: 15px; display: block; }
        input, select {
            width: 100%;
            padding: 8px 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        small { color: #666; display:block; margin-top:4px; }
    </style>
</head>

<body>
    <div class="container">
        <h2>Configuração de Envio de WhatsApp - V6</h2>

        <!-- 🔥 NOVO: Canal de Saída -->
        <label for="phone_id">Canal de Saída (Phone ID)</label>
        <select id="phone_id">
            <option value="" selected>Servopa Private (Padrão)</option>
            <option value="827790747093981">C6 (Novo)</option>
        </select>
        <small>Escolha por qual número a mensagem será enviada.</small>

        <!-- Campo do telefone -->
        <label for="phoneField">Campo do Telefone *</label>
        <select id="phoneField">
            <option value="">Carregando campos...</option>
        </select>
        <small>Selecione o campo da Data Extension que contém o número de telefone.</small>

        <!-- Nome do template -->
        <label for="templateName">Nome do Template *</label>
        <input id="templateName" type="text" placeholder="ex: black_servopa" />

        <!-- Idioma -->
        <label for="langCode">Idioma *</label>
        <select id="langCode">
            <option value="en" selected>English (en_US)</option>
            <option value="pt_BR">Português Brasil (pt_BR)</option>
        </select>

        <!-- URL da imagem -->
        <label for="imageUrl">URL da Imagem (opcional)</label>
        <input id="imageUrl" type="url"
               placeholder="https://image.mktcloud.consorcioservopa.com.br/lib/.../banner.jpeg" />
        <small>Use a URL pública da imagem do Content Builder para templates com header de imagem.</small>
    </div>
</body>
</html>
