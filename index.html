<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Enviar WhatsApp (Salesforce) - V4</title>

    <!-- Usa arquivos V3 para forçar o MC a recarregar -->
    <script src="jquery.min.js"></script>
    <script src="postmonger.js"></script>
    <script src="customActivity-v3.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f4f4f7;
        }
        .container {
            max-width: 700px;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h2 { color: #0070d2; }
        label { font-weight: bold; margin-top: 15px; display: block; }
        input, select {
            width: 100%;
            padding: 8px 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        small { color: #666; }
    </style>
</head>

<body>
    <div class="container">
        <h2>Configuração de Envio de WhatsApp - V3</h2>

        <label for="phoneField">Campo do Telefone *</label>
        <select id="phoneField">
            <option value="">Carregando campos...</option>
        </select>
        <small>Selecione o campo da Data Extension que contém o número de telefone.</small>

        <label for="templateName">Nome do Template *</label>
        <input id="templateName" type="text" placeholder="ex: black_servopa" />

        <label for="langCode">Idioma *</label>
        <select id="langCode">
            <option value="pt_BR">Português Brasil (pt_BR)</option>
            <option value="en_US">English (en_US)</option>
        </select>

        <label for="var1">Variável 1 (opcional)</label>
        <input id="var1" type="text" placeholder="ex: FirstName" />

        <label for="var2">Variável 2 (opcional)</label>
        <input id="var2" type="text" placeholder="ex: LastName" />
    </div>
</body>
</html>
