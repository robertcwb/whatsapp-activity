<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Teste WhatsApp Activity</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="postmonger.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .info {
            padding: 15px;
            border-radius: 4px;
            background: #e8f4fd;
            border-left: 4px solid #0176d3;
        }
    </style>
</head>
<body>
    <h2>🔧 Teste de Configuração da Activity</h2>
    <div class="info">
        <p>Se você conseguir clicar em <strong>Done</strong> no Journey e o modal fechar,
        significa que o handshake com o Journey Builder está funcionando.</p>
    </div>

    <script>
        var connection = new Postmonger.Session();
        var activity = {};

        console.log("🔵 index.html carregado, enviando READY...");

        // Quando o iframe carrega
        document.addEventListener("DOMContentLoaded", function () {
            connection.trigger("ready");
        });

        // Quando o Journey manda os dados iniciais
        connection.on("initActivity", function (payload) {
            console.log("✅ initActivity recebido:", payload);
            activity = payload || {};
            connection.trigger("updateButton", { button: "next", enabled: true });
        });

        // Quando o usuário clica em Done
        connection.on("clickedNext", function () {
            console.log("🟢 clickedNext recebido, enviando updateActivity...");

            // Só marca como configurado, sem mexer em inArguments
            activity.metaData = activity.metaData || {};
            activity.metaData.isConfigured = true;

            // Desabilita o botão para evitar clique duplo
            connection.trigger("updateButton", { button: "next", enabled: false });

            // Entrega a activity de volta para o Journey
            connection.trigger("updateActivity", activity);
        });
    </script>
</body>
</html>
